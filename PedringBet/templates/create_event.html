{% extends 'base.html' %}

{% block title %}Admin - Create Event{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Create New Event</h4>
                </div>
                <div class="card-body">
                    <form id="createEventForm">
                        <div class="mb-3">
                            <label class="form-label">Event Title</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="3" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Status</label>
                                <select class="form-select" id="status">
                                    <option value="pending">Pending</option>
                                    <option value="open" selected>Open for Betting</option>
                                    <option value="closed">Closed</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Start Time</label>
                                <input type="datetime-local" class="form-control" id="start_time">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">End Time</label>
                                <input type="datetime-local" class="form-control" id="end_time">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Min Bet (₱)</label>
                                <input type="number" class="form-control" id="min_bet" value="1.00" min="0.01" step="0.01" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Max Bet (₱)</label>
                                <input type="number" class="form-control" id="max_bet" value="100000.00" min="1" step="0.01" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Pool Fee (%)</label>
                                <input type="number" class="form-control" id="pool_fee" value="5.00" min="0" max="50" step="0.01" required>
                                <small class="text-muted">House takes this % from pool</small>
                            </div>
                        </div>

                        <hr>
                        <h5><i class="bi bi-list-ul"></i> Outcomes</h5>
                        <div id="outcomesContainer">
                            <div class="row outcome-row mb-2">
                                <div class="col-7">
                                    <input type="text" class="form-control outcome-name" placeholder="Outcome name (e.g., Team A wins)" required>
                                </div>
                                <div class="col-3">
                                    <input type="number" class="form-control outcome-odds" placeholder="Odds" min="1.01" step="0.01" required>
                                </div>
                                <div class="col-2">
                                    <button type="button" class="btn btn-danger remove-outcome">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-outline-success btn-sm mb-3" id="addOutcome">
                            <i class="bi bi-plus"></i> Add Outcome
                        </button>

                        <div id="errorMessage" class="alert alert-danger d-none"></div>
                        <div id="successMessage" class="alert alert-success d-none"></div>

                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-check-circle"></i> Create Event
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(async function() {
    const token = localStorage.getItem('accessToken');
    if (!token) {
        window.location.href = '/login/';
        return;
    }
    
    try {
        const resp = await fetch('/api/users/profile/', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (resp.ok) {
            const data = await resp.json();
            if (!data.is_staff) {
                document.querySelector('.card-body').innerHTML = `
                    <div class="alert alert-danger text-center">
                        <i class="bi bi-lock-fill" style="font-size: 3em;"></i>
                        <h4 class="mt-3">Access Denied</h4>
                        <p>You must be an admin to create events.</p>
                        <a href="/" class="btn btn-primary">Go Home</a>
                    </div>
                `;
                return;
            }
        }
    } catch (e) {
        window.location.href = '/login/';
        return;
    }

document.getElementById('addOutcome').addEventListener('click', () => {
    const container = document.getElementById('outcomesContainer');
    const newRow = document.createElement('div');
    newRow.className = 'row outcome-row mb-2';
    newRow.innerHTML = `
        <div class="col-7">
            <input type="text" class="form-control outcome-name" placeholder="Outcome name (e.g., Team A wins)" required>
        </div>
        <div class="col-3">
            <input type="number" class="form-control outcome-odds" placeholder="Odds" min="1.01" step="0.01" required>
        </div>
        <div class="col-2">
            <button type="button" class="btn btn-danger remove-outcome">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    `;
    container.appendChild(newRow);
});

document.getElementById('outcomesContainer').addEventListener('click', (e) => {
    if (e.target.closest('.remove-outcome')) {
        const rows = document.querySelectorAll('.outcome-row');
        if (rows.length > 1) {
            e.target.closest('.outcome-row').remove();
        }
    }
});

function formatDateTimeLocal(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    return `${year}-${month}-${day}T${hours}:${minutes}`;
}

const now = new Date();
document.getElementById('start_time').value = formatDateTimeLocal(now);
document.getElementById('end_time').value = formatDateTimeLocal(now);

document.getElementById('createEventForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    errorDiv.classList.add('d-none');
    successDiv.classList.add('d-none');

    const outcomes = [];
    document.querySelectorAll('.outcome-row').forEach(row => {
        const name = row.querySelector('.outcome-name').value;
        const odds = parseFloat(row.querySelector('.outcome-odds').value);
        if (name && odds) {
            outcomes.push({ name, odds });
        }
    });

    if (outcomes.length < 2) {
        errorDiv.textContent = 'Please add at least 2 outcomes';
        errorDiv.classList.remove('d-none');
        return;
    }

    const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        status: document.getElementById('status').value,
        start_time: document.getElementById('start_time').value || null,
        end_time: document.getElementById('end_time').value || null,
        min_bet: parseFloat(document.getElementById('min_bet').value),
        max_bet: parseFloat(document.getElementById('max_bet').value),
        pool_fee: parseFloat(document.getElementById('pool_fee').value),
        outcomes: outcomes
    };

    const token = localStorage.getItem('accessToken');

    try {
        const response = await fetch('/api/events/', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            successDiv.textContent = 'Event created successfully!';
            successDiv.classList.remove('d-none');
            document.getElementById('createEventForm').reset();
        } else {
            const errorData = await response.json();
            errorDiv.textContent = JSON.stringify(errorData);
            errorDiv.classList.remove('d-none');
        }
    } catch (error) {
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.classList.remove('d-none');
    }
});
})();
</script>
{% endblock %}
